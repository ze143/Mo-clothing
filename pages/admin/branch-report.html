    <a href="/pages/admin/stock-audit.html">

            </li>

                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></a
          >
        </li>
      </ul>
    </div>

    <div class="main-content">
      <nav class="top-navbar">
        <div>
          <h4 class="mb-0">
            <i class="fas fa-chart-bar me-2"></i>تقرير الفروع
          </h4>
        </div>
        <div class="user-info">
          <div class="avatar" id="userAvatar">A</div>
          <span id="userName">أدمن</span>
        </div>
      </nav>

      <!-- إحصائيات سريعة -->
      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <div class="stats-card primary">
            <div
              class="stats-icon"
              style="
                background: rgba(44, 62, 80, 0.1);
                color: var(--primary-color);
              "
            >
              <i class="fas fa-store"></i>
            </div>
            <div class="stats-number" id="totalBranches">0</div>
            <div class="stats-label">عدد الفروع</div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="stats-card success">
            <div
              class="stats-icon"
              style="
                background: rgba(39, 174, 96, 0.1);
                color: var(--success-color);
              "
            >
              <i class="fas fa-cubes"></i>
            </div>
            <div class="stats-number" id="totalItems">0</div>
            <div class="stats-label">إجمالي القطع في الفروع</div>
          </div>
        </div>
      </div>

      <!-- فلاتر -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">بحث</label>
              <input
                type="text"
                class="form-control"
                id="searchBranch"
                placeholder="ابحث عن فرع..."
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">ترتيب حسب</label>
              <select class="form-select" id="sortBranches">
                <option value="name">الاسم (أ-ي)</option>
                <option value="name_desc">الاسم (ي-أ)</option>
                <option value="most_items">الأكثر قطعاً</option>
                <option value="least_items">الأقل قطعاً</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- تقارير الفروع -->
      <div class="card">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span><i class="fas fa-list me-2"></i>مخزون الفروع</span>
          <div>
            <button
              class="btn btn-sm btn-secondary me-2"
              onclick="resetFilters()"
            >
              <i class="fas fa-undo me-1"></i>إعادة تعيين
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <div id="branchReportContainer">
            <!-- يتم عرض التقارير هنا بواسطة JavaScript -->
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/admin/branch-report.js"></script>
  </body>
</html>
